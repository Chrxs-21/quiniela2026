name: Cron Jobs

on:
  schedule:
    - cron: '15 * * * *'    # sync cada hora en el minuto 15 (usa 24 requests al día, muy seguro)
    - cron: '0 0 */5 * *'   # keep-alive cada 5 días para evitar que Supabase se pause

jobs:
  sync-results:
    runs-on: ubuntu-latest
    steps:
      - name: Sync resultados y equipos
        run: |
          curl -f -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://quiniela2026-three.vercel.app/api/sync-results

  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Keep alive Supabase
        run: |
          curl -f -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://quiniela2026-three.vercel.app/api/keep-alive